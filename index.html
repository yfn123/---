<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星愿瓶 - 100个心愿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #06030d;
      --bg-dark: #0d0618;
      --bg-mid: #1a0f2e;
      --bg-accent: #2a1548;

      --star-blue: #7ec8fc;
      --star-blue-core: #c8e6ff;
      --star-blue-glow: rgba(126, 200, 252, 0.75);
      --star-gold: #ffa726;
      --star-gold-core: #ffe0a0;
      --star-gold-glow: rgba(255, 167, 38, 0.85);

      --text-bright: #fff8f0;
      --text-warm: #e8ddd0;
      --text-muted: rgba(232, 221, 208, 0.45);
      --text-dim: rgba(232, 221, 208, 0.25);

      --accent-coral: #ff6b6b;
      --accent-rose: #ff8a80;

      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-edge: rgba(255, 255, 255, 0.12);
      --glass-shine: rgba(255, 255, 255, 0.2);
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: calc(100vh * 9 / 16);
      background:
        radial-gradient(ellipse at 50% 20%, rgba(60, 30, 90, 0.6) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 80%, rgba(40, 15, 70, 0.4) 0%, transparent 35%),
        radial-gradient(ellipse at 20% 70%, rgba(30, 20, 60, 0.3) 0%, transparent 30%),
        linear-gradient(180deg,
          var(--bg-deep) 0%,
          var(--bg-dark) 25%,
          var(--bg-mid) 50%,
          var(--bg-dark) 75%,
          var(--bg-deep) 100%
        );
      overflow: hidden;
    }

    /* 多层背景装饰圆 */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(60px);
      opacity: 0.4;
    }

    .bg-orb-1 {
      top: 5%; left: 10%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(126, 200, 252, 0.3) 0%, transparent 70%);
    }

    .bg-orb-2 {
      top: 30%; right: -5%;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(255, 167, 38, 0.25) 0%, transparent 70%);
    }

    .bg-orb-3 {
      bottom: 20%; left: -10%;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 70%);
    }

    .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 1; transform: scale(2); }
    }

    /* 顶部区域 */
    .header-area {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 20px 20px 0;
      z-index: 10;
      background: linear-gradient(180deg, rgba(6,3,13,0.9) 0%, transparent 100%);
      padding-bottom: 30px;
    }

    .header {
      text-align: center;
      position: relative;
    }

    .header::before {
      content: '✦';
      position: absolute;
      left: 15%; top: 8px;
      font-size: 10px;
      color: var(--star-gold);
      opacity: 0.6;
      animation: twinkle 3s ease-in-out infinite;
    }

    .header::after {
      content: '✦';
      position: absolute;
      right: 15%; top: 8px;
      font-size: 10px;
      color: var(--star-blue);
      opacity: 0.6;
      animation: twinkle 3s ease-in-out infinite;
      animation-delay: -1.5s;
    }

    .header h1 {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 4px;
      color: var(--text-bright);
      text-shadow:
        0 0 30px rgba(255, 167, 38, 0.4),
        0 0 60px rgba(255, 167, 38, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .header .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 8px;
      font-weight: 300;
    }

    .time-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .divider-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,167,38,0.4), transparent);
    }

    .live-time {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 3px;
      font-weight: 300;
    }

    /* 进度条 */
    .progress-container {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      z-index: 10;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-track::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,
        var(--star-blue) 0%,
        #a8d8ff 40%,
        var(--star-gold) 70%,
        var(--accent-coral) 100%
      );
      border-radius: 2px;
      transition: width 0.6s ease;
      position: relative;
      box-shadow: 0 0 12px var(--star-gold-glow);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      background: var(--text-bright);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--star-gold);
    }

    /* 玻璃容器 */
    .glass-container {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      width: 185px;
      height: 245px;
      cursor: pointer;
      transition: transform 0.35s ease;
    }

    .glass-container:hover {
      transform: translateX(-50%) scale(1.025);
    }

    .bottle-body {
      position: absolute;
      inset: 0;
      border-radius: 22px 22px 80px 80px;
      background: linear-gradient(145deg,
        rgba(255,255,255,0.11) 0%,
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.08) 100%
      );
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 80px rgba(255, 167, 38, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 2px 2px var(--glass-shine),
        inset 0 -30px 50px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    /* 玻璃多层高光 */
    .bottle-body::before {
      content: '';
      position: absolute;
      top: 6%; left: 10%;
      width: 30%; height: 50%;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 45%,
        transparent 100%
      );
      border-radius: 50%;
      filter: blur(5px);
      transform: rotate(-10deg);
    }

    .bottle-body::after {
      content: '';
      position: absolute;
      bottom: 6%; right: 6%;
      width: 50%; height: 35%;
      background: radial-gradient(ellipse,
        rgba(255, 167, 38, 0.08) 0%,
        rgba(255, 107, 107, 0.04) 40%,
        transparent 70%
      );
      border-radius: 50%;
    }

    /* 玻璃边缘光 */
    .glass-edge-left {
      position: absolute;
      left: 0; top: 10%; bottom: 12%;
      width: 2px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(255,255,255,0.08) 20%,
        rgba(255,255,255,0.15) 50%,
        rgba(255,255,255,0.08) 80%,
        transparent 100%
      );
      border-radius: 1px;
    }

    .glass-edge-right {
      position: absolute;
      right: 0; top: 10%; bottom: 12%;
      width: 2px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(255,255,255,0.05) 20%,
        rgba(255,255,255,0.1) 50%,
        rgba(255,255,255,0.05) 80%,
        transparent 100%
      );
      border-radius: 1px;
    }

    .bottle-neck {
      position: absolute;
      top: -24px; left: 50%;
      transform: translateX(-50%);
      width: 48px; height: 30px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.09) 50%,
        rgba(255,255,255,0.04) 100%
      );
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.15);
    }

    .bottle-cork {
      position: absolute;
      top: -44px; left: 50%;
      transform: translateX(-50%);
      width: 38px; height: 20px;
      background: linear-gradient(180deg,
        #c4a882 0%,
        #9a7d5c 40%,
        #7a5c3c 100%
      );
      border-radius: 4px 4px 2px 2px;
      box-shadow:
        0 3px 10px rgba(0,0,0,0.4),
        inset 0 1px 1px rgba(255,255,255,0.2);
    }

    .bottle-cork::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 44px; height: 5px;
      background: linear-gradient(180deg,
        #b09060 0%,
        #6a5030 100%
      );
      border-radius: 0 0 3px 3px;
    }

    .stars-container {
      position: absolute;
      inset: 10px;
      overflow: visible;
      border-radius: 18px 18px 74px 74px;
      z-index: 2;
    }

    /* 星星 - 多层光晕 */
    .star {
      position: absolute;
      width: 22px; height: 22px;
      cursor: pointer;
      transition: filter 0.3s ease;
    }

    .star svg { width: 100%; height: 100%; }

    .star.incomplete {
      filter:
        drop-shadow(0 0 4px var(--star-blue-glow))
        drop-shadow(0 0 10px rgba(126, 200, 252, 0.4))
        drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .star.complete {
      filter:
        drop-shadow(0 0 6px var(--star-gold-glow))
        drop-shadow(0 0 14px rgba(255, 167, 38, 0.5))
        drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .star:nth-child(3n) { animation: driftA 6s ease-in-out infinite; }
    .star:nth-child(3n+1) { animation: driftB 7s ease-in-out infinite; animation-delay: -2s; }
    .star:nth-child(3n+2) { animation: driftC 5.5s ease-in-out infinite; animation-delay: -1s; }

    .star:nth-child(odd) { z-index: 3; }
    .star:nth-child(even) { z-index: 2; }
    .star:nth-child(5n) { z-index: 4; }

    @keyframes driftA {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(5px, -8px) rotate(10deg); }
      40% { transform: translate(-3px, -4px) rotate(-5deg); }
      60% { transform: translate(4px, -10px) rotate(8deg); }
      80% { transform: translate(-2px, -6px) rotate(-3deg); }
    }

    @keyframes driftB {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-6px, -5px) rotate(-12deg); }
      50% { transform: translate(3px, -8px) rotate(6deg); }
      75% { transform: translate(5px, -3px) rotate(10deg); }
    }

    @keyframes driftC {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      30% { transform: translate(-4px, -12px) rotate(-8deg) scale(1.05); }
      55% { transform: translate(6px, -7px) rotate(14deg) scale(0.98); }
      80% { transform: translate(-3px, -9px) rotate(-6deg) scale(1.02); }
    }

    .star.complete:nth-child(odd) { animation-name: driftA-gold; }
    .star.complete:nth-child(even) { animation-name: driftB-gold; }
    .star.complete:nth-child(3n) { animation-name: driftC-gold; }

    @keyframes driftA-gold {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(6px, -10px) rotate(15deg); }
      40% { transform: translate(-4px, -5px) rotate(-8deg); }
      60% { transform: translate(5px, -12px) rotate(12deg); }
      80% { transform: translate(-3px, -7px) rotate(-5deg); }
    }
    @keyframes driftB-gold {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-7px, -6px) rotate(-15deg); }
      50% { transform: translate(4px, -10px) rotate(10deg); }
      75% { transform: translate(6px, -4px) rotate(14deg); }
    }
    @keyframes driftC-gold {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      30% { transform: translate(-5px, -14px) rotate(-10deg) scale(1.08); }
      55% { transform: translate(7px, -8px) rotate(18deg) scale(0.96); }
      80% { transform: translate(-4px, -11px) rotate(-8deg) scale(1.04); }
    }

    .star:hover { transform: scale(1.4) !important; }

    .click-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      pointer-events: none;
      z-index: 1;
    }

    .click-hint .icon {
      font-size: 32px;
      margin-bottom: 6px;
      opacity: 0.4;
      animation: hintPulse 2.5s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.4; }
      50% { transform: scale(1.2) rotate(5deg); opacity: 0.7; }
    }

    .count-badge {
      position: absolute;
      bottom: 8px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 167, 38, 0.12);
      border: 1px solid rgba(255, 167, 38, 0.25);
      padding: 5px 14px;
      border-radius: 18px;
      font-size: 10px;
      color: var(--star-gold);
      backdrop-filter: blur(12px);
      z-index: 5;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(255, 167, 38, 0.1);
    }

    .count-badge span { font-weight: 500; font-size: 14px; }

    /* 掉落星星动画 */
    .falling-star {
      position: absolute;
      width: 24px; height: 24px;
      z-index: 100;
      pointer-events: none;
      animation: fallIntoBottle 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .falling-star svg { width: 100%; height: 100%; }

    @keyframes fallIntoBottle {
      0% { top: 35%; opacity: 1; transform: scale(1.4) rotate(0deg); }
      20% { top: 48%; transform: scale(1.2) rotate(45deg); }
      50% { top: 62%; transform: scale(1.1) rotate(90deg); }
      70% { top: 72%; transform: scale(1.0) rotate(150deg); }
      85% { top: 80%; opacity: 0.9; transform: scale(0.7) rotate(200deg); }
      100% { top: 88%; opacity: 0; transform: scale(0.2) rotate(360deg); }
    }

    /* FAB 按钮 */
    .fab-button {
      position: absolute;
      top: 392px; left: 50%;
      transform: translateX(-50%);
      width: 56px; height: 56px;
      background: linear-gradient(135deg,
        var(--star-gold) 0%,
        var(--accent-coral) 100%
      );
      border: none;
      border-radius: 50%;
      font-size: 28px;
      color: white;
      cursor: pointer;
      box-shadow:
        0 4px 25px rgba(255, 107, 107, 0.5),
        0 0 50px rgba(255, 167, 38, 0.3),
        inset 0 1px 1px rgba(255,255,255,0.3);
      z-index: 20;
      transition: all 0.3s ease;
      animation: fabGlow 2.5s ease-in-out infinite;
    }

    .fab-button:hover {
      transform: translateX(-50%) scale(1.15);
      box-shadow:
        0 6px 35px rgba(255, 107, 107, 0.6),
        0 0 70px rgba(255, 167, 38, 0.45);
    }

    .fab-button:active { transform: translateX(-50%) scale(0.95); }

    @keyframes fabGlow {
      0%, 100% {
        box-shadow: 0 4px 25px rgba(255,107,107,0.5), 0 0 50px rgba(255,167,38,0.3);
      }
      50% {
        box-shadow: 0 4px 35px rgba(255,107,107,0.65), 0 0 80px rgba(255,167,38,0.5);
      }
    }

    .fab-label {
      position: absolute;
      top: 455px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 4px;
    }

    /* 心愿列表 */
    .wish-list-section {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 39%;
      background:
        linear-gradient(180deg,
          rgba(6, 3, 13, 0.5) 0%,
          rgba(6, 3, 13, 0.85) 15%,
          rgba(6, 3, 13, 0.98) 100%
        );
      padding: 20px 14px 15px;
    }

    /* 列表顶部装饰 */
    .wish-list-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .wish-list-header::before,
    .wish-list-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255, 167, 38, 0.25) 50%,
        transparent
      );
    }

    .wish-list-title {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 6px;
      font-weight: 300;
    }

    .wish-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: calc(100% - 40px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .wish-list::-webkit-scrollbar { width: 3px; }
    .wish-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
      border-radius: 3px;
    }
    .wish-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255,167,38,0.4), rgba(255,107,107,0.3));
      border-radius: 3px;
    }

    .wish-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.025);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.22s ease;
      animation: slideIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* 列表项左边框装饰 */
    .wish-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg,
        transparent,
        var(--star-blue-glow) 50%,
        transparent
      );
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .wish-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .wish-item:hover::before { opacity: 1; }

    .wish-item.complete::before {
      background: linear-gradient(180deg,
        transparent,
        var(--star-gold-glow) 50%,
        transparent
      );
      opacity: 0.6;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wish-star {
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .wish-star.incomplete {
      color: var(--star-blue);
      text-shadow: 0 0 8px var(--star-blue-glow);
    }

    .wish-star.complete {
      color: var(--star-gold);
      text-shadow: 0 0 10px var(--star-gold-glow);
      animation: starPop 0.5s ease;
    }

    @keyframes starPop {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.5) rotate(180deg); }
      100% { transform: scale(1) rotate(360deg); }
    }

    .wish-content { flex: 1; min-width: 0; }

    .wish-text {
      font-size: 12px;
      color: var(--text-warm);
      word-break: break-word;
      line-height: 1.5;
    }

    .wish-item.complete .wish-text {
      text-decoration: line-through;
      opacity: 0.35;
      color: var(--text-muted);
    }

    .wish-date {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    .wish-date.overdue {
      color: var(--accent-coral);
      font-weight: 500;
    }

    .wish-date.near { color: var(--star-gold); font-weight: 500; }

    .wish-date.urgent {
      color: var(--accent-coral);
      font-weight: 500;
      animation: urgentPulse 1.5s ease-in-out infinite;
    }

    @keyframes urgentPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; text-shadow: 0 0 8px var(--accent-coral); }
    }

    .wish-delete {
      font-size: 12px;
      color: rgba(255, 107, 107, 0.25);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .wish-delete:hover {
      color: var(--accent-coral);
      background: rgba(255, 107, 107, 0.12);
    }

    .empty-hint {
      text-align: center;
      padding: 30px 0;
      color: var(--text-muted);
      font-size: 11px;
    }

    .empty-hint .icon {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.25;
    }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 3, 13, 0.92);
      backdrop-filter: blur(16px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal {
      background: linear-gradient(145deg,
        rgba(35, 20, 55, 0.98) 0%,
        rgba(12, 6, 22, 0.99) 100%
      );
      border: 1px solid rgba(255, 167, 38, 0.15);
      border-radius: 20px;
      padding: 28px 24px;
      width: 84%;
      max-width: 280px;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 60px rgba(255, 167, 38, 0.04),
        inset 0 1px 1px rgba(255,255,255,0.05);
    }

    .modal-overlay.active .modal { transform: scale(1); }

    .modal h2 {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 22px;
      color: var(--star-gold);
      margin-bottom: 22px;
      text-align: center;
      text-shadow: 0 0 30px rgba(255, 167, 38, 0.3);
      letter-spacing: 2px;
    }

    .modal input[type="text"] {
      width: 100%;
      padding: 13px 15px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-warm);
      outline: none;
      transition: all 0.28s ease;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .modal input::placeholder {
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .modal input:focus {
      border-color: rgba(255, 167, 38, 0.4);
      box-shadow: 0 0 25px rgba(255, 167, 38, 0.1);
      background: rgba(255, 255, 255, 0.06);
    }

    .deadline-section { margin-bottom: 16px; }

    .deadline-label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .deadline-options { display: flex; flex-wrap: wrap; gap: 6px; }

    .deadline-btn {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .deadline-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 167, 38, 0.2);
      color: var(--text-warm);
    }

    .deadline-btn.active {
      background: rgba(255, 167, 38, 0.1);
      border-color: var(--star-gold);
      color: var(--star-gold);
      box-shadow: 0 0 15px rgba(255, 167, 38, 0.1);
    }

    .custom-date { margin-top: 8px; }

    .custom-date input {
      width: 100%;
      padding: 9px 11px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-warm);
      outline: none;
      color-scheme: dark;
    }

    .custom-date input:focus { border-color: rgba(255, 167, 38, 0.4); }

    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }

    .modal-btn {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.22s ease;
      letter-spacing: 1px;
    }

    .modal-btn.cancel {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .modal-btn.cancel:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-warm);
    }

    .modal-btn.confirm {
      background: linear-gradient(135deg, var(--star-gold) 0%, var(--accent-coral) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 167, 38, 0.25);
    }

    .modal-btn.confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(255, 167, 38, 0.4);
    }

    /* 爆发动画 */
    .burst {
      position: absolute;
      font-size: 24px;
      animation: burstAnim 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes burstAnim {
      0% { transform: scale(0.3) rotate(0deg); opacity: 1; }
      100% { transform: scale(2.5) rotate(220deg); opacity: 0; }
    }

    /* 通知 */
    .notification {
      position: fixed;
      top: 18px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: linear-gradient(145deg,
        rgba(40, 20, 55, 0.96) 0%,
        rgba(15, 8, 28, 0.98) 100%
      );
      border: 1px solid rgba(255, 167, 38, 0.25);
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 12px;
      color: var(--text-warm);
      z-index: 200;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 0 50px rgba(255, 167, 38, 0.08);
      text-align: center;
      max-width: 85%;
      letter-spacing: 0.5px;
    }

    .notification.show { transform: translateX(-50%) translateY(0); }

    .notification .notif-icon {
      font-size: 18px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="particles" id="particles"></div>

    <div class="header-area">
      <div class="header">
        <h1>星愿瓶</h1>
        <p class="subtitle">S T A R &nbsp; W I S H E S</p>
      </div>
      <div class="time-row">
        <div class="divider-line"></div>
        <div class="live-time" id="liveTime">--:--:--</div>
        <div class="divider-line"></div>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="glass-container" id="glassBottle" onclick="openModal()">
      <div class="bottle-neck"></div>
      <div class="bottle-cork"></div>
      <div class="bottle-body">
        <div class="glass-edge-left"></div>
        <div class="glass-edge-right"></div>
      </div>
      <div class="stars-container" id="starsContainer">
        <div class="click-hint" id="clickHint">
          <div class="icon">✧</div>
          <div>点击许下心愿</div>
        </div>
      </div>
      <div class="count-badge"><span id="wishCount">0</span> / 100</div>
    </div>

    <button class="fab-button" onclick="openModal()">+</button>
    <span class="fab-label">许下心愿</span>

    <section class="wish-list-section">
      <div class="wish-list-header">
        <span class="wish-list-title">星 愿 清 单</span>
      </div>
      <div class="wish-list" id="wishList">
        <div class="empty-hint" id="emptyHint">
          <div class="icon">◈</div>
          <div>还没有心愿<br>点击上方按钮许下第一个愿望</div>
        </div>
      </div>
    </section>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
      <div class="modal">
        <h2>✧ 许下心愿 ✧</h2>
        <input type="text" id="wishInput" placeholder="写下你的心愿..." maxlength="50" onkeypress="handleKeyPress(event)">
        <div class="deadline-section">
          <label class="deadline-label">完成期限</label>
          <div class="deadline-options" id="deadlineOptions">
            <button class="deadline-btn" data-days="7">7天</button>
            <button class="deadline-btn" data-days="30">30天</button>
            <button class="deadline-btn" data-days="90">3个月</button>
            <button class="deadline-btn" data-days="365">1年</button>
            <button class="deadline-btn" data-days="-1">自定义</button>
            <button class="deadline-btn active" data-days="0">不限</button>
          </div>
        </div>
        <div class="custom-date" id="customDateWrapper" style="display:none;">
          <input type="date" id="customDate" min="">
        </div>
        <div class="modal-buttons">
          <button class="modal-btn cancel" onclick="closeModal()">取消</button>
          <button class="modal-btn confirm" onclick="addWish()">确认</button>
        </div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification">
    <span class="notif-icon">✦</span>
    <span id="notifText"></span>
  </div>

  <script>
    const MAX_WISHES = 100;
    let wishes = JSON.parse(localStorage.getItem('starWishes')) || [];
    let selectedDeadline = 0;
    let lastCheckedDay = -1;

    const starSVG = {
      incomplete: `<svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5L12 2Z" fill="#7ec8fc" stroke="#a8d8ff" stroke-width="0.5"/>
        <path d="M12 5L13.5 9.2H18L14.5 11.8L16 17L12 14L8 17L9.5 11.8L6 9.2H10.5L12 5Z" fill="#c8e6ff" opacity="0.6"/>
      </svg>`,
      complete: `<svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5L12 2Z" fill="#ffa726" stroke="#ffc04d" stroke-width="0.5"/>
        <path d="M12 5L13.5 9.2H18L14.5 11.8L16 17L12 14L8 17L9.5 11.8L6 9.2H10.5L12 5Z" fill="#ffe0a0" opacity="0.65"/>
      </svg>`
    };

    function updateLiveTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('liveTime').textContent = `${h}:${m}:${s}`;
    }

    function checkDeadlines() {
      const now = Date.now();
      wishes.forEach((wish) => {
        if (!wish.deadline || wish.done) return;

        const diff = wish.deadline - now;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

        if (days === 7 || days === 3 || days === 1) {
          showNotification(`${days}天后「${wish.text.substring(0, 8)}...」即将到期`);
        }

        if (diff < 0) {
          const overdueDay = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
          if (overdueDay > 0 && overdueDay !== lastCheckedDay) {
            lastCheckedDay = overdueDay;
            showNotification(`「${wish.text.substring(0, 8)}...」已逾期${overdueDay}天`);
          }
        }
      });
    }

    let notifTimer = null;
    function showNotification(text) {
      const notif = document.getElementById('notification');
      document.getElementById('notifText').textContent = text;
      notif.classList.add('show');
      clearTimeout(notifTimer);
      notifTimer = setTimeout(() => notif.classList.remove('show'), 4000);
    }

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 45; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 4 + 's';
        p.style.animationDuration = (3 + Math.random() * 4) + 's';
        container.appendChild(p);
      }

      document.querySelectorAll('.deadline-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.deadline-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedDeadline = parseInt(btn.dataset.days);
          const customWrapper = document.getElementById('customDateWrapper');
          if (selectedDeadline === -1) {
            customWrapper.style.display = 'block';
            document.getElementById('customDate').min = new Date().toISOString().split('T')[0];
          } else {
            customWrapper.style.display = 'none';
          }
        });
      });
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function getDeadlineInfo(wish) {
      if (!wish.deadline) return '';

      const now = Date.now();
      const diff = wish.deadline - now;
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

      if (wish.done) return `<div class="wish-date">已完成 ✓</div>`;

      if (diff < 0) {
        return `<div class="wish-date overdue">已逾期 ${Math.abs(days)} 天</div>`;
      } else if (days <= 1) {
        return `<div class="wish-date urgent">今天截止！</div>`;
      } else if (days <= 3) {
        return `<div class="wish-date urgent">还剩 ${days} 天</div>`;
      } else if (days <= 7) {
        return `<div class="wish-date near">还剩 ${days} 天</div>`;
      } else {
        return `<div class="wish-date">${formatDate(wish.deadline)}</div>`;
      }
    }

    function updateStarsDisplay() {
      const container = document.getElementById('starsContainer');
      const clickHint = document.getElementById('clickHint');

      container.querySelectorAll('.star').forEach(s => s.remove());

      if (wishes.length === 0) {
        clickHint.style.display = 'block';
      } else {
        clickHint.style.display = 'none';
        const displayCount = Math.min(wishes.length, 20);
        for (let i = 0; i < displayCount; i++) {
          const wish = wishes[i];
          const star = document.createElement('div');
          star.className = 'star ' + (wish.done ? 'complete' : 'incomplete');
          star.innerHTML = wish.done ? starSVG.complete : starSVG.incomplete;
          star.style.left = (8 + Math.random() * 76) + '%';
          star.style.top = (10 + Math.random() * 68) + '%';
          star.style.zIndex = (i % 5) + 1;
          star.style.animationDuration = (4.5 + Math.random() * 3) + 's';
          container.appendChild(star);
        }
      }

      document.getElementById('wishCount').textContent = wishes.length;
      updateProgress();
    }

    function updateProgress() {
      const completed = wishes.filter(w => w.done).length;
      const total = wishes.length || 1;
      document.getElementById('progressFill').style.width = (completed / total * 100) + '%';
    }

    function updateWishList() {
      const list = document.getElementById('wishList');
      const emptyHint = document.getElementById('emptyHint');

      list.querySelectorAll('.wish-item').forEach(item => item.remove());

      if (wishes.length === 0) {
        emptyHint.style.display = 'block';
      } else {
        emptyHint.style.display = 'none';
        wishes.forEach((wish, index) => {
          const item = document.createElement('div');
          item.className = 'wish-item' + (wish.done ? ' complete' : '');
          item.innerHTML = `
            <span class="wish-star ${wish.done ? 'complete' : 'incomplete'}" onclick="toggleWish(${index})">${wish.done ? '★' : '☆'}</span>
            <div class="wish-content">
              <div class="wish-text">${escapeHtml(wish.text)}</div>
              ${getDeadlineInfo(wish)}
            </div>
            <span class="wish-delete" onclick="deleteWish(${index})">✕</span>
          `;
          list.appendChild(item);
        });
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openModal() {
      if (wishes.length >= MAX_WISHES) { alert('已达100个心愿上限!'); return; }
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('wishInput').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('wishInput').value = '';
      selectedDeadline = 0;
      document.querySelectorAll('.deadline-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.deadline-btn[data-days="0"]').classList.add('active');
      document.getElementById('customDateWrapper').style.display = 'none';
    }

    function closeModalOnOverlay(e) { if (e.target.id === 'modalOverlay') closeModal(); }
    function handleKeyPress(e) { if (e.key === 'Enter') addWish(); if (e.key === 'Escape') closeModal(); }

    function addWish() {
      const input = document.getElementById('wishInput');
      const text = input.value.trim();
      if (!text) return;
      if (wishes.length >= MAX_WISHES) { alert('已达100个心愿上限!'); return; }

      let deadline = null;
      if (selectedDeadline === -1) {
        const d = document.getElementById('customDate').value;
        if (d) deadline = new Date(d).getTime() + 24 * 60 * 60 * 1000 - 1;
      } else if (selectedDeadline > 0) {
        deadline = Date.now() + selectedDeadline * 24 * 60 * 60 * 1000;
      }

      wishes.unshift({ text, done: false, createdAt: Date.now(), deadline });
      saveWishes();
      triggerFallingStar();
      closeModal();
      updateStarsDisplay();
      updateWishList();
    }

    function triggerFallingStar() {
      const scene = document.getElementById('scene');
      const falling = document.createElement('div');
      falling.className = 'falling-star';
      falling.innerHTML = starSVG.incomplete;

      const bottleRect = document.getElementById('glassBottle').getBoundingClientRect();
      const sceneRect = scene.getBoundingClientRect();

      falling.style.left = (bottleRect.left - sceneRect.left + bottleRect.width / 2 - 12) + 'px';
      falling.style.top = '32%';

      scene.appendChild(falling);
      setTimeout(() => falling.remove(), 1250);
    }

    function toggleWish(index) {
      wishes[index].done = !wishes[index].done;
      if (wishes[index].done) createBurstEffect();
      saveWishes();
      updateStarsDisplay();
      updateWishList();
    }

    function createBurstEffect() {
      const container = document.getElementById('starsContainer');
      const burst = document.createElement('span');
      burst.className = 'burst';
      burst.textContent = '✦';
      burst.style.left = (28 + Math.random() * 38) + '%';
      burst.style.top = (28 + Math.random() * 38) + '%';
      container.appendChild(burst);
      setTimeout(() => burst.remove(), 520);
    }

    function deleteWish(index) {
      wishes.splice(index, 1);
      saveWishes();
      updateStarsDisplay();
      updateWishList();
    }

    function saveWishes() { localStorage.setItem('starWishes', JSON.stringify(wishes)); }

    function init() {
      updateLiveTime();
      setInterval(updateLiveTime, 1000);
      setInterval(checkDeadlines, 60000);
      createParticles();
      updateStarsDisplay();
      updateWishList();
    }

    init();
  </script>
</body>
</html>
